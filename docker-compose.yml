services:
  postgres:
    image: postgres:17.6-alpine
    container_name: pepperminto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pepperminto
      POSTGRES_PASSWORD: pepperminto
      POSTGRES_DB: pepperminto
    volumes:
      - pepperminto_postgres:/var/lib/postgresql/data
    expose:
      - 5432

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pepperminto_api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pepperminto:pepperminto@postgres:5432/pepperminto
    expose:
      - "3001"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: pepperminto_client
    restart: unless-stopped
    env_file: .env
    expose:
      - "3002"

  knowledge-base:
    build:
      context: .
      dockerfile: apps/knowledge-base/Dockerfile
    container_name: pepperminto_kb
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"

  landing-page:
    build:
      context: .
      dockerfile: apps/landing-page/Dockerfile
    container_name: pepperminto_landing
    restart: unless-stopped
    env_file: .env
    expose:
      - "3004"

volumes:
  pepperminto_postgres:
